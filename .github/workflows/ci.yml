name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Import smoke test
        run: python -c "from agent_finops.api.main import app; from agent_finops_client import FinOpsClient; print('ok')"
      - name: Tests
        run: pytest -q
