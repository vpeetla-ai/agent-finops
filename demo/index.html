<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent FinOps — Live Demo</title>
    <style>
      body { font-family: -apple-system, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; background: #0b0b0f; color: #e6e6ea; }
      h1 { font-size: 1.4rem; }
      .muted { color: #9a9aa5; font-size: 0.85rem; }
      section { background: #16161d; border: 1px solid #2a2a35; border-radius: 12px; padding: 1.25rem; margin-top: 1rem; }
      label { display: block; margin-top: 0.6rem; font-size: 0.85rem; }
      input { width: 100%; padding: 0.5rem; margin-top: 0.25rem; border-radius: 6px; border: 1px solid #2a2a35; background: #0b0b0f; color: #e6e6ea; }
      button { margin-top: 0.9rem; padding: 0.5rem 1rem; border-radius: 6px; border: none; background: #4f8cff; color: white; cursor: pointer; }
      pre { white-space: pre-wrap; background: #0b0b0f; padding: 0.75rem; border-radius: 8px; font-size: 0.8rem; }
      .breached { color: #ff6b6b; font-weight: 600; }
    </style>
  </head>
  <body>
    <h1>Agent FinOps</h1>
    <p class="muted">Real usage metering + budget breach detection for AI agent fleets.</p>

    <div id="workbench-product">
      <label for="apiBase">API base URL</label>
      <input id="apiBase" value="https://agent-finops.onrender.com" />
      <label for="apiKey">API key (only if the backend requires one)</label>
      <input id="apiKey" type="password" placeholder="X-API-Key" />
    </section>

    <section>
      <h2 style="font-size:1rem">Record usage</h2>
      <label for="scopeValue">Scope (agent id)</label>
      <input id="scopeValue" value="demo-agent" />
      <label for="promptTokens">Prompt tokens</label>
      <input id="promptTokens" type="number" value="1000" />
      <label for="completionTokens">Completion tokens</label>
      <input id="completionTokens" type="number" value="250" />
      <button id="record">Record usage</button>
      <button id="setBudget" style="background:#3a3a45">Set $1.00 budget</button>
      <pre id="output">Waiting...</pre>
    </section>
    </div>

    <link rel="stylesheet" href="architect-panel.css" />
    <script src="architect-config.js"></script>
    <script src="architect-panel.js"></script>
    <script>
      const $ = (id) => document.getElementById(id);

      function headers() {
        const h = { "Content-Type": "application/json" };
        const key = $("apiKey").value.trim();
        if (key) h["X-API-Key"] = key;
        return h;
      }

      $("record").addEventListener("click", async () => {
        const base = $("apiBase").value.replace(/\/$/, "");
        const body = {
          scope_type: "agent",
          scope_value: $("scopeValue").value,
          provider: "openai",
          model: "gpt-4o-mini",
          prompt_tokens: Number($("promptTokens").value),
          completion_tokens: Number($("completionTokens").value),
        };
        try {
          const res = await fetch(`${base}/v1/usage`, { method: "POST", headers: headers(), body: JSON.stringify(body) });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
          $("output").innerHTML = data.breached
            ? `<span class="breached">BUDGET BREACHED</span>\n${JSON.stringify(data, null, 2)}`
            : JSON.stringify(data, null, 2);
        } catch (err) {
          $("output").textContent = "Error: " + err.message;
        }
      });

      $("setBudget").addEventListener("click", async () => {
        const base = $("apiBase").value.replace(/\/$/, "");
        const scope = $("scopeValue").value;
        try {
          const res = await fetch(`${base}/v1/budget/agent/${encodeURIComponent(scope)}`, {
            method: "PUT",
            headers: headers(),
            body: JSON.stringify({ budget_usd: 1.0 }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
          $("output").textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          $("output").textContent = "Error: " + err.message;
        }
      });
    </script>
  </body>
</html>
